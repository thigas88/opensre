# tfsec configuration for the bench Terraform module.
#
# Each entry under `exclude` is paired with a justification. The exclusion
# list mirrors `.checkov.yaml` so the two tools agree on what we have
# chosen NOT to enforce for this Phase 1 bench. If you remove an exclude,
# the rationale should be addressed (fix the resource or document why the
# rule no longer applies).
#
# tfsec rule IDs reference: https://aquasecurity.github.io/tfsec/

exclude:
  # ---- S3 results bucket ------------------------------------------------ #

  - aws-s3-enable-bucket-logging
    # AES256 SSE-S3 sufficient for non-PII bench artifacts. Versioning
    # provides change recovery. Mirrors checkov CKV_AWS_18.

  - aws-s3-encryption-customer-key
    # AWS-managed encryption sufficient for non-PII bench data. Mirrors
    # checkov CKV_AWS_145.

  # ---- CloudWatch log group --------------------------------------------- #

  - aws-cloudwatch-log-group-customer-key
    # AWS-managed log encryption is sufficient. Mirrors checkov CKV_AWS_158.

  # ---- Secrets Manager -------------------------------------------------- #

  - aws-ssm-secret-use-customer-key
    # AWS-managed encryption sufficient. CMK rotation buys nothing for
    # external SaaS keys. Mirrors checkov CKV_AWS_149.

  # ---- ECR repository --------------------------------------------------- #

  - aws-ecr-repository-customer-key
    # AES256 sufficient for container image storage. Mirrors checkov
    # CKV_AWS_136. CMK adds key-management burden without protecting
    # against a real threat — image contents are non-sensitive bench
    # framework code, not customer data.

  # ---- Networking ------------------------------------------------------- #

  - aws-ec2-no-public-egress-sgr
    # Egress to 0.0.0.0/0 is intentional and required — the bench task
    # makes outbound HTTPS calls to LLM provider APIs (Anthropic, OpenAI,
    # DeepSeek), Hugging Face, and AWS service endpoints. No NAT gateway
    # provisioned; default VPC public subnet routes egress via IGW.
    # Mirrors checkov CKV_AWS_382. (The older rule ID
    # `aws-vpc-no-public-egress-sgr` was renamed to this in tfsec 1.28+.)

  # ---- IAM policies ----------------------------------------------------- #

  - aws-iam-no-policy-wildcards
    # tfsec flags every IAM statement whose resource list contains an ARN
    # wildcard suffix, including patterns that are required by the AWS
    # IAM model:
    #
    #   - `<log-group-arn>:*`  — CloudWatch log streams are created
    #     dynamically per task; you cannot enumerate them ahead of time.
    #   - `<bucket-arn>/*`     — granting object-level access to all
    #     objects in a bucket is the canonical S3 IAM pattern. The bucket
    #     itself is bounded by a specific ARN.
    #   - `Resource: "*"` for `ecs:RunTask` + a `condition: ecs:cluster
    #     ARN` — RunTask doesn't accept a resource-level ARN; scoping is
    #     via the IAM Condition on the cluster, which tfsec doesn't
    #     evaluate.
    #
    # Removing these "wildcards" would mean either (a) granting nothing,
    # (b) hard-coding every possible log stream / S3 object, or (c)
    # dropping the cluster condition — none of which improves security.
    # Mirrors checkov CKV2_AWS_40 / CKV_AWS_109 (handled by checkov via
    # its more nuanced wildcard detection that recognizes safe patterns).

# `severity_overrides` could be used to downgrade specific rules (e.g.,
# from HIGH to LOW) instead of fully excluding, if we wanted findings
# visible but non-blocking. Not used here — excludes are simpler and the
# decisions above are firm.
