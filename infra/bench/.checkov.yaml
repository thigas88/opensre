# Checkov configuration for the bench Terraform module.
#
# `skip-check` lists rules we have intentionally chosen NOT to enforce for
# this Phase 1 bench infrastructure. Each entry is accompanied by a
# justification — if you remove a skip, the rationale should be addressed
# (either fix the underlying resource or document why the rule no longer
# applies).
#
# The bench is:
#   - Isolated from production systems
#   - Processes non-PII benchmark artifacts
#   - Triggered weekly at most
#   - Bounded by a per-run cost budget enforced at the framework layer
#
# Rules listed below are valid in general but provide no meaningful
# security or operational benefit at this scope.

framework: terraform
quiet: true
soft-fail: false

skip-check:
  # ---- ECR repository --------------------------------------------------- #

  - CKV_AWS_136     # ECR repository KMS CMK encryption
                    # Skip: AWS-managed AES256 is sufficient for container
                    # images that are public-ish (immutable tags + scan on
                    # push). CMK adds key-management burden without
                    # protecting against a real threat — the image contents
                    # are non-sensitive bench framework code, not customer
                    # data. Mirrors the same reasoning as CKV_AWS_145
                    # (S3 KMS) and CKV_AWS_158 (CloudWatch KMS) below.

  # ---- S3 results bucket ------------------------------------------------ #

  - CKV_AWS_18      # S3 access logging
                    # Skip: bench artifacts have no audit-trail requirement.
                    # Versioning already provides change recovery.

  - CKV_AWS_144     # S3 cross-region replication
                    # Skip: bench artifacts can be regenerated by re-running
                    # the bench. Replication adds cost without benefit.

  - CKV_AWS_145     # S3 default encryption with KMS CMK
                    # Skip: AES256 (SSE-S3) is sufficient for non-PII
                    # benchmark data. CMKs add per-request cost and key
                    # management burden without unlocking a real threat
                    # model here.

  - CKV2_AWS_61     # S3 bucket lifecycle configuration
                    # Skip: results dataset is small (~MBs per run). Manual
                    # cleanup is acceptable; lifecycle adds complexity. If
                    # bucket growth becomes a real issue, reconsider.

  - CKV2_AWS_62     # S3 bucket event notifications
                    # Skip: no downstream consumer of bucket events. Bench
                    # workflow polls the task and downloads results
                    # synchronously.

  - CKV_AWS_300     # S3 lifecycle: abort incomplete multipart upload
                    # Skip: bench writes small JSON files (no multipart
                    # uploads). Rule does not apply to this workload.

  # ---- CloudWatch log group --------------------------------------------- #

  - CKV_AWS_158     # CloudWatch Log Group KMS encryption
                    # Skip: AWS-managed encryption is the default and is
                    # sufficient for bench logs. CMKs add key-management
                    # overhead without solving a real threat — the same
                    # IAM principal can read logs either way.

  - CKV_AWS_338     # CloudWatch log retention >= 1 year
                    # Skip: 30-day retention is intentional. Bench artifacts
                    # of record live in S3 (versioned, longer-lived).
                    # Logs are debug-only and do not satisfy any compliance
                    # retention requirement.

  # ---- Secrets Manager -------------------------------------------------- #

  - CKV_AWS_149     # Secrets Manager KMS CMK
                    # Skip: AWS-managed encryption is sufficient.
                    # CMK rotation buys nothing for external SaaS API keys
                    # (Anthropic / OpenAI / DeepSeek / Hugging Face) — those
                    # secrets cannot be rotated programmatically anyway.

  - CKV2_AWS_57     # Secrets Manager automatic rotation
                    # Skip: rotation is impossible for external SaaS API
                    # keys (provider has no rotation API exposed to AWS).
                    # Manual rotation when needed; documented in design doc.

  # ---- Networking ------------------------------------------------------- #

  - CKV2_AWS_5      # Security group is not attached to a resource
                    # Skip: SG is referenced by the task at run time via
                    # `aws ecs run-task --network-configuration`, not
                    # declared as part of a service or network interface.
                    # Checkov cannot statically see the binding.

  - CKV2_AWS_11     # VPC flow logs enabled
                    # Skip: default VPC is account-shared; bench module
                    # does not own VPC flow logging. If/when bench moves
                    # to a dedicated VPC, revisit.

  - CKV2_AWS_12     # Default SG restricts all traffic
                    # Skip: default SG is account-shared, not managed here.

  - CKV_AWS_382     # SG egress to 0.0.0.0/0 on port -1 (all)
                    # Skip: outbound to 0.0.0.0/0 is intentional and
                    # required — the bench task makes outbound HTTPS calls
                    # to LLM provider APIs (Anthropic, OpenAI, DeepSeek),
                    # Hugging Face, and AWS service endpoints. No NAT
                    # gateway provisioned; default VPC public subnet
                    # routes egress via IGW. Mirrors the tfsec exclusion
                    # `aws-vpc-no-public-egress-sgr`.

  # ---- ECS task --------------------------------------------------------- #

  - CKV_AWS_336     # Read-only root filesystem on container
                    # Skip: bench downloads the State Snapshot dataset to
                    # ephemeral container storage at task start; a
                    # read-only root would require a separate writable
                    # volume mount. Container is ephemeral and
                    # single-tenant — root-FS write is acceptable.
