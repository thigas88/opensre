id: 302-sample-alert-investigate-phrasing
title: Sample alert phrased as "investigate a sample test alert"
intent_class: investigation
input:
  prompt: investigate a sample test alert?
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
notes:
- Regression for the "investigate a sample test alert?" phrasing. The verb "investigate" and the trailing
  "?" previously pushed this to the conversational assistant ("paste the alert text"). The LLM planner
  must recognize the "sample/test alert" noun phrase and emit the alert_sample tool with template=generic,
  not investigation_start or assistant_handoff.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: true
planned_actions:
- kind: sample_alert
  content: generic
  source: llm
  target_surface: investigation
  template: generic
response_contract:
  must_contain_any:
  - sample alert generic
  must_not_contain: []
  forbidden_actions:
  - investigation
history:
  expected:
  - type: alert
    ok: true
runs: 3
tool_actions:
- surface: dispatch
  kind: sample_alert
  template: generic
  content: generic
