id: 315-quoted-directive-investigation
title: Quoted directive dispatches investigation, not a chatty handoff
intent_class: investigation
input:
  prompt: investigate "checkout is returning 502s for EU customers"
session:
  has_prior_state: false
  configured_integrations:
  - sentry
  resolved_integrations:
    sentry:
      connection_verified: true
      organization_slug: fixture-org
      project_slug: fixture-project
      auth_token: fixture-token
      base_url: https://sentry.io
notes:
- Regression for quoted directives. An explicit action verb (investigate) whose object is quotation-marked
  text must treat the quoted text as the investigation payload and emit investigation_start with alert_text
  set to the quoted text verbatim. Quoted content must never be downgraded to a chatty statement or rhetorical
  question and handed off to the assistant.
- 'Sentry is connected so the integration-backed investigation gate (>=1 connected integration, added
  in #2871) is satisfied. With a data source connected, the explicit quoted directive dispatches an investigation
  instead of handing off to suggest connecting one. Contrast with 313 (incident, no integrations -> handoff).'
turn:
  expected_kind: agent
policy:
  executes_terminal_action: true
planned_actions:
- kind: investigation
  content: checkout is returning 502s for EU customers
  source: llm
  target_surface: investigation
response_contract:
  must_contain_any:
  - investigate
  - investigation
  - rca
  - checkout
  - '502'
  must_not_contain:
  - $ /
history:
  expected:
  - type: alert
    ok: true
runs: 3
tool_actions:
- surface: dispatch
  kind: investigation
