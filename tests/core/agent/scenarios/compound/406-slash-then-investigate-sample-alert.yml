id: 406-slash-then-investigate-sample-alert
title: Health check slash followed by "investigate a sample test alert"
intent_class: compound
input:
  prompt: run /health and then investigate a sample test alert
session:
  has_prior_state: false
  configured_integrations: []
  resolved_integrations: {}
available_capabilities:
  slash_commands:
  - /health
  cli_commands: []
  synthetic_suites: []
notes:
- Sibling of 405 using the "investigate a sample test alert" phrasing. Verifies the sample alert is fired
  as its OWN alert_sample tool call (a separate tool from /health), even though the clause leads with
  the verb "investigate". The sample alert must be LLM-decided, not folded into investigation_start.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: true
planned_actions:
- kind: slash
  content: /health
  source: llm
  target_surface: slash
  command: /health
  args: []
- kind: sample_alert
  content: generic
  source: llm
  target_surface: investigation
  template: generic
response_contract:
  must_contain_any:
  - ran /health
  must_not_contain: []
  forbidden_actions:
  - investigation
history:
  expected:
  - type: slash
    ok: true
  - type: alert
    ok: true
runs: 3
tool_actions:
- surface: dispatch
  kind: slash
  command: /health
  args: []
  content: /health
- surface: dispatch
  kind: sample_alert
  template: generic
  content: generic
