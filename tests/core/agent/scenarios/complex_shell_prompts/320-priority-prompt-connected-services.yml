id: 320-priority-prompt-connected-services
title: Priority prompt — show connected services
intent_class: complex_shell_prompts
input:
  prompt: show me connected services
session:
  has_prior_state: false
  configured_integrations:
  - datadog
  - sentry
  resolved_integrations: {}
available_capabilities:
  slash_commands:
  - /integrations
  cli_commands: []
  synthetic_suites: []
notes:
- 'P0 priority prompt (misc_capability_question #2) from OpenSRE analytics priority-prompts report.'
- Prompt is sent verbatim; planner should map to /integrations list.
turn:
  expected_kind: agent
policy:
  executes_terminal_action: true
planned_actions:
- kind: slash
  content: /integrations list
  source: llm
  target_surface: slash
  command: /integrations
  args:
  - list
response_contract:
  must_contain_any:
  - connected services
  - integrations
  - services
  - ran /integrations list
  must_not_contain:
  - can't help
  - cannot help
  - I can't help
  - I cannot help
history:
  expected:
  - type: slash
    ok: true
runs: 3
tool_actions:
- surface: dispatch
  kind: slash
  command: /integrations
  args:
  - list
  content: /integrations list
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
