id: 314-windows-crash-multisource-query
title: Windows crash epic dispatches an investigation across Sentry, GitHub, and PostHog
intent_class: complex_shell_prompts
input:
  prompt: Hey OpenSRE figure out why our OpenSRE agent is crashing on Windows machines by querying (a)
    sentry, (b) github issues, (c) posthog
session:
  has_prior_state: false
  configured_integrations:
  - sentry
  - github
  - posthog_mcp
  resolved_integrations:
    sentry:
      connection_verified: true
      organization_slug: fixture-org
      project_slug: fixture-project
      auth_token: fixture-token
      base_url: https://sentry.io
    github:
      connection_verified: true
      owner: tracer-cloud
      repo: opensre
      mode: streamable-http
      url: https://api.githubcopilot.com/mcp/
      auth_token: fixture-token
    posthog_mcp:
      connection_verified: true
      mode: streamable-http
      url: https://mcp.posthog.com/mcp
      auth_token: fixture-token
notes:
- Multi-source investigation request with Sentry, GitHub, and PostHog connected. Because at least one
  integration is connected, the planner DISPATCHES an investigation (investigation_start) with synthesized
  alert_text instead of handing off. This is the dispatch counterpart to 313 (no integrations -> handoff).
- 'The investigation alert_text is synthesized from the prompt and varies per run, so planned_actions
  leaves content empty: the planning test asserts an investigation with non-empty alert_text rather than
  an exact string.'
- 'Gather negative control: connected integrations must dispatch investigation_start, not the conversational
  gather loop on the same turn. not_called on Sentry/GitHub/PostHog gather tools proves dispatch won over
  handoff fan-out (contrast 338, where the same integrations DO gather).'
turn:
  expected_kind: agent
policy:
  executes_terminal_action: true
planned_actions:
- kind: investigation
  source: llm
  target_surface: investigation
response_contract:
  must_contain_any:
  - investigat
  - rca
  - Windows
  - crash
  must_not_contain:
  - $ /
  forbidden_actions:
  - shell
history:
  expected:
  - type: alert
    ok: true
runs: 5
tool_actions:
- surface: dispatch
  kind: investigation
- surface: gather
  tools:
  - search_sentry_issues
  - search_github_issues
  - list_posthog_tools
  expect: not_called
