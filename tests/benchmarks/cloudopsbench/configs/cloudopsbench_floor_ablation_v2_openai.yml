# Cloud-OpsBench — floor ablation v2 (retry of failed exp_floor0_ablation).
#
# Experiment ID: ``exp_floor_ablation_v2``
#
# Background:
#   The prior ``exp_floor0_ablation`` (task ``3dff6fbd...`` on 2026-06-07T20:46Z)
#   dispatched with ``BENCH_MIN_TOOL_CALLS=0`` correctly set in the container
#   overrides BUT produced an empty CloudWatch log stream and no S3 artifacts.
#   Root cause unverified — the env var was visible in describe-tasks output but
#   no bench output was written. Most likely: container entrypoint script
#   doesn't forward ``BENCH_MIN_TOOL_CALLS`` into the bench process, OR the
#   process started but exited before writing the first cell. This v2 config
#   restarts the experiment cleanly.
#
# Hypothesis:
#   The 2026-06-07 ``exp_definitive`` run (n=353 paired scenarios, gpt-4o,
#   ``MIN_TOOL_CALLS=5``) showed opensre+llm scoring ~7pp lower than
#   llm_alone_pure aggregate, ~15pp lower on unseen-shape. The most-cited
#   mechanical explanation: forced extra tool calls past a good conclusion
#   bring in noise that pollutes the predictor's input. Concretely
#   (boutique/startup/36): agent identifies bad image at call 2-3, floor
#   forces continuation, CheckServiceConnectivity returns "registry
#   unreachable" (because pod hasn't started), predictor wanders to
#   image_registry_dns_failure.
#
#   This experiment tests that hypothesis directly. ``BENCH_MIN_TOOL_CALLS=0``
#   lets the LLM stop when it decides.
#
# Pre-registered predictions (from "How to improve opensre's prompt"
# writeup, listed in order of perceived likelihood):
#   - Most likely (50%): floor=0 a1 > floor=5 a1 by 2-5pp on opensre+llm.
#     Confirms forced exploration is meaningful noise; suggests next
#     iteration is a trimmed system prompt (Change 2 in the writeup).
#   - Likely (35%): floor=0 a1 ≈ floor=5 a1 ± 2pp. The floor isn't the
#     dominant noise source; prompt structure is. Next iteration jumps
#     straight to a trimmed-prompt experiment.
#   - Possible (15%): floor=0 a1 < floor=5 a1 by 2-5pp. Forced exploration
#     buys real signal that we'd lose. Calibration was correct.
#
# Decision rule (committed BEFORE seeing the result):
#   - floor=0 wins by ≥0.03 with CI excluding 0 → next experiment is the
#     trimmed-prompt variant (Change 2). Estimated next-experiment cost: $4.
#   - CI includes 0 → forced exploration is not the lever. Skip floor
#     experiments. Next experiment is the trimmed-prompt variant directly.
#   - floor=0 loses by ≥0.03 → confirms MIN_TOOL_CALLS=5 calibration was
#     correct. The noise source is elsewhere (prompt structure, validation
#     scaffolding, hedging language).
#
# Cost: 40 cases × 1 LLM × 3 runs × 2 modes = 240 cells ≈ $4 (gpt-4o).
# Wall time: ~1h at workers=1.

benchmark: cloudopsbench

# Same two-arm pairing as exp_definitive so the contrast is interpretable.
modes:
  - opensre+llm
  - llm_alone_pure

llms:
  - gpt-4o

model_versions:
  gpt-4o: gpt-4o-2024-11-20

# 3 runs/case averages single-shot LLM noise. Seed pins the SAME 40 cases
# as cloudopsbench_fixa_validation_openai so this experiment IS apples-to-
# apples against the prior fixa baseline at floor=5.
runs_per_case: 3

workers: 1
cost_budget_usd: 25.0
seed: 42

# Floor-ablation experiment knob: override the BenchInvestigationAgent's
# MIN_TOOL_CALLS class attribute for this run. Setting to 0 lets the LLM
# stop when it decides — the load-bearing test of the "forced exploration
# adds noise" hypothesis. Config-driven (not env-var-driven) so the floor
# value is part of the reproducible experiment definition.
min_tool_calls: 0

output_dir: .bench-results/cloudopsbench_floor_ablation_v2_openai/

pre_registration_path: tests/benchmarks/cloudopsbench/configs/preregistrations/cloudopsbench_v1.yml

filters:
  # 40 seeded cases, BOTH shape strata — same slice as fixa baseline.
  limit: 40
  seen_shape: [true, false]
  systems: []
  fault_categories: []

report_formats:
  - json
  - markdown
