# Pre-registration for example.yml
#
# Commit this BEFORE running the benchmark. The framework refuses to start
# without a non-empty pre-registration on disk. The point: lock expected
# results before seeing data, so reports can diff actual vs expected and
# discrepancies are auditable (integrity Mechanism 1).
#
# Real pre-registrations name the BDIL cycle ID + hypotheses (see framework
# doc § 14). This file is a placeholder for the example config.

cycle: example-2026-05-17
hypotheses:
  - id: H000
    mechanism: |
      Example pre-registration. No specific hypothesis — this is the
      first smoke run of the framework on real data.
    expected_lift: {}
    expected_regression: {}
    confidence: 0.0
    cost_to_implement: 0.0
    notes: |
      Smoke runs don't need a real hypothesis. The pre-registration exists
      here to satisfy IntegrityGuard M1; real cycles will populate
      mechanism + expected_lift + expected_regression per the framework
      doc § 14 BDIL pattern.
