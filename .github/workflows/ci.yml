name: CI

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"

  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "pytest.ini"
      - "Makefile"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    continue-on-error: ${{ matrix.os == 'windows-latest' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Lint
        run: uv run python -m ruff check app/ tests/

      - name: Format check
        run: uv run python -m ruff format --check app/ tests/

      - name: Typecheck
        run: uv run python -m mypy app/

  test:
    name: test (${{ matrix.shard }})
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          - os: ubuntu-latest
            shard: tools-services
            pytest_paths: >-
              tests/tools
              tests/services
              tests/utils
              tests/masking
              tests/types
              tests/watch_dog
          - os: ubuntu-latest
            shard: cli-runtime
            # Live planner/routing contracts (tests/cli/.../test_llm_action_planner.py)
            # are validated on openai, matching routing-live-post-merge.yml. The
            # default anthropic tool-call model (haiku) cannot reliably perform
            # compound action routing, so pin this shard to openai.
            llm_provider: openai
            pytest_paths: >-
              tests/cli
              tests/remote
              tests/agent
              tests/agents
              tests/app
              tests/analytics
              tests/nodes
              tests/pipeline
              tests/delivery
              tests/entrypoints
              tests/sandbox
              tests/hermes
              tests/github
          - os: ubuntu-latest
            shard: integrations-and-misc
            pytest_paths: >-
              tests/integrations
              tests/deployment
              tests/benchmarks
              tests/chaos_engineering
              tests/packaging
              tests/shared
              tests/test_guardrails
              tests/cli_smoke_test.py
              tests/test_aws_urls.py
              tests/test_bug_fixes_e2e.py
              tests/test_chaos_engineering_paths.py
              tests/test_config.py
              tests/test_datadog_adapter.py
              tests/test_datadog_provider.py
              tests/test_deployment_health.py
              tests/test_devcontainer.py
              tests/test_dockerfile.py
              tests/test_ec2_deploy.py
              tests/test_ec2_instance.py
              tests/test_google_docs.py
              tests/test_kill_switch_matrix.py
              tests/test_llm_credentials.py
              tests/test_llm_reasoning_effort.py
              tests/test_mariadb_integration.py
              tests/test_mongodb_atlas_integration.py
              tests/test_mongodb_integration.py
              tests/test_naming_conventions.py
              tests/test_openclaw_integration.py
              tests/test_removed_architecture_references.py
              tests/test_sentry_init.py
              tests/test_state.py
              tests/test_upstream_correlation_provider.py
              tests/test_version.py
              tests/test_webapp.py
          - os: ubuntu-latest
            shard: e2e-general
            pytest_paths: >-
              tests/e2e
            extra_pytest_args: >-
              --ignore=tests/e2e/kubernetes
              --ignore=tests/e2e/openclaw
              --ignore=tests/e2e/upstream_lambda
              --ignore=tests/e2e/upstream_prefect_ecs_fargate
              --ignore=tests/e2e/upstream_apache_flink_ecs
          - os: ubuntu-latest
            shard: e2e-provider-and-openclaw
            pytest_paths: >-
              tests/e2e/openclaw
              tests/e2e/upstream_lambda
              tests/e2e/upstream_prefect_ecs_fargate
              tests/e2e/upstream_apache_flink_ecs
              tests/e2e/kubernetes

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    env:
      # Per-shard LLM provider for live_llm contracts; defaults to anthropic.
      LLM_PROVIDER: ${{ matrix.llm_provider || 'anthropic' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
      GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
      GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
      GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
      GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
      GCLOUD_OTLP_ENDPOINT: ${{ secrets.GCLOUD_OTLP_ENDPOINT }}
      GCLOUD_OTLP_AUTH_HEADER: ${{ secrets.GCLOUD_OTLP_AUTH_HEADER }}
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        env:
          COVERAGE_FILE: .coverage.${{ matrix.shard }}
        run: >-
          uv run python -m pytest -n auto -v
          ${{ matrix.pytest_paths }}
          --cov=app
          --cov-report=
          --ignore=tests/e2e/kubernetes_local_alert_simulation
          --ignore=tests/synthetic
          ${{ matrix.extra_pytest_args || '' }}
          -m "not synthetic"

      - name: Upload shard coverage data
        if: >-
          always() &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.shard }}
          path: .coverage.${{ matrix.shard }}*
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7

  coverage-report:
    name: coverage-report
    runs-on: ubuntu-latest
    needs: [test]
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Download shard coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          path: ./
          merge-multiple: true

      - name: Combine coverage and build report
        run: |
          uv run python -m coverage combine .
          uv run python -m coverage html

      - name: Upload combined coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-ubuntu-latest
          path: |
            htmlcov/
            .coverage
          retention-days: 7

  test-kubernetes:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15

    if: >-
      github.repository == 'Tracer-Cloud/opensre' &&
      (github.event_name == 'push' ||
      (
        github.event_name == 'pull_request' &&
        (
          contains(github.event.pull_request.title, 'k8s') ||
          contains(github.event.pull_request.title, 'kubernetes')
        )
      ))

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Run Kubernetes tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: uv run python -m tests.e2e.kubernetes.test_local

  should-run-thorough:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'Tracer-Cloud/opensre'
    outputs:
      thorough: ${{ steps.filter.outputs.thorough }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            thorough:
              - ".github/workflows/ci.yml"
              - "pyproject.toml"
              - "uv.lock"
              - "app/deployment/**"
              - "app/integrations/**"
              - "app/pipeline/**"
              - "app/remote/**"
              - "app/services/**"
              - "app/tools/**"
              - "tests/e2e/cloudwatch_demo/**"
              - "tests/e2e/upstream_lambda/**"
              - "tests/e2e/upstream_prefect_ecs_fargate/**"
              - "tests/e2e/upstream_apache_flink_ecs/**"

  test-thorough:
    runs-on: ubuntu-latest
    needs: [test, should-run-thorough]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'Tracer-Cloud/opensre' &&
      needs.should-run-thorough.outputs.thorough == 'true'
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: cloudwatch-demo
            command: python3 -m tests.e2e.cloudwatch_demo.test_aws
          - name: upstream-lambda
            command: python3 -m tests.e2e.upstream_lambda.test_agent_e2e
          - name: prefect-ecs-fargate
            command: python3 -m tests.e2e.upstream_prefect_ecs_fargate.test_agent_e2e
          - name: flink-ecs
            command: python3 -m tests.e2e.upstream_apache_flink_ecs.test_agent_e2e

    name: test-thorough (${{ matrix.name }})

    env:
      # Thorough e2e suites make live LLM calls; run them on openai because the
      # default anthropic account is credit-exhausted. Requires a valid, funded
      # OPENAI_API_KEY secret.
      LLM_PROVIDER: openai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      JWT_TOKEN: ${{ secrets.JWT_TOKEN }}
      TRACER_API_URL: ${{ secrets.TRACER_API_URL }}
      TRACER_INGEST_TOKEN: ${{ secrets.TRACER_INGEST_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      GRAFANA_READ_TOKEN: ${{ secrets.GRAFANA_READ_TOKEN }}
      GCLOUD_HOSTED_METRICS_ID: ${{ secrets.GCLOUD_HOSTED_METRICS_ID }}
      GCLOUD_HOSTED_METRICS_URL: ${{ secrets.GCLOUD_HOSTED_METRICS_URL }}
      GCLOUD_HOSTED_LOGS_ID: ${{ secrets.GCLOUD_HOSTED_LOGS_ID }}
      GCLOUD_HOSTED_LOGS_URL: ${{ secrets.GCLOUD_HOSTED_LOGS_URL }}
      GCLOUD_RW_API_KEY: ${{ secrets.GCLOUD_RW_API_KEY }}
      CLOUDWATCH_VERIFY_LOGS: ${{ matrix.name == 'cloudwatch-demo' && '0' || '1' }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Install tracer CLI
        run: |
          curl -sSL https://install.tracer.cloud | sh -s user_36fbN6K6FwEgJFHsQv1pUByo8K6

      - name: Initialize tracer (optional)
        run: |
          sudo tracer init --token ${{ secrets.JWT_TOKEN }}
        continue-on-error: true
        timeout-minutes: 2

      - name: Run test
        run: uv run ${{ matrix.command }}
        timeout-minutes: 30
